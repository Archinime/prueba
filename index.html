<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archinime OS - Habitación de Lunari</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <link rel="stylesheet" href="lobby-style.css">
</head>
<body>

    <video id="weather-video" autoplay loop muted playsinline></video>

    <div id="room-background">
        <!-- Modelo principal: paredes -->
        <model-viewer 
            id="room-model" 
            class="bg-model main-model" 
            src="paredes.glb" 
            shadow-intensity="1" 
            camera-controls 
            disable-zoom 
            disable-tap
            disable-pan
            interaction-prompt="none"
            camera-target="0m 1m 0m"
            camera-orbit="0deg 70deg 2.8m" 
            min-camera-orbit="-35deg 70deg 2.8m"
            max-camera-orbit="35deg 70deg 2.8m"
            field-of-view="60deg"
            position="0m 0m 0m"
            rotation="0deg 0deg 0deg"
            scale="1 1 1">
        </model-viewer>

        <!-- Modelo secundario: cortinas -->
        <model-viewer 
            id="cortinas-model" 
            class="bg-model secondary-model" 
            src="cortinas.glb" 
            shadow-intensity="1" 
            disable-zoom 
            disable-tap
            disable-pan
            interaction-prompt="none"
            camera-target="0m 1m 0m"
            camera-orbit="0deg 70deg 2.8m"
            min-camera-orbit="-35deg 70deg 2.8m"
            max-camera-orbit="35deg 70deg 2.8m"
            field-of-view="60deg"
            position="0m 0m 0m"
            rotation="0deg 0deg 0deg"
            scale="1 1 1">
        </model-viewer>

        <!-- Modelo secundario: piso -->
        <model-viewer 
            id="piso-model" 
            class="bg-model secondary-model" 
            src="piso.glb" 
            shadow-intensity="1" 
            disable-zoom 
            disable-tap
            disable-pan
            interaction-prompt="none"
            camera-target="0m 1m 0m"
            camera-orbit="0deg 70deg 2.8m"
            min-camera-orbit="-35deg 70deg 2.8m"
            max-camera-orbit="35deg 70deg 2.8m"
            field-of-view="60deg"
            position="0m 0m 0m"
            rotation="0deg 0deg 0deg"
            scale="1 1 1">
        </model-viewer>
    </div>

    <main id="room-container">

        <div id="character-layer">
            <!-- Personaje -->
            <model-viewer 
                id="waifu-placeholder" 
                src="lunari_saluda.glb" 
                autoplay 
                disable-zoom
                disable-tap
                disable-pan
                interaction-prompt="none"
                shadow-intensity="1"
                position="0m 0m 0m"
                rotation="0deg 0deg 0deg"
                scale="1 1 1">
            </model-viewer>
            
            <div id="dialogue-box" class="hidden">
                <h3 class="char-name">Lunari</h3>
                <p id="dialogue-text">¡Hola! Bienvenido de nuevo a casa.<br>¿Vemos un anime hoy?</p>
            </div>
        </div>

        <!-- Botón para abrir el panel de edición -->
        <button id="edit-toggle" class="edit-toggle-btn">
            <i class="fas fa-sliders-h"></i>
        </button>

        <!-- Panel de edición mejorado -->
        <div id="edit-panel" class="edit-panel hidden">
            <div class="edit-panel-header">
                <h3><i class="fas fa-cube"></i> Editor de Modelos</h3>
                <button id="close-panel" class="close-btn"><i class="fas fa-times"></i></button>
            </div>
            <div class="edit-panel-content">
                <label for="model-select">Modelo:</label>
                <select id="model-select">
                    <option value="room-model">Paredes</option>
                    <option value="cortinas-model">Cortinas</option>
                    <option value="piso-model">Piso</option>
                    <option value="waifu-placeholder">Personaje</option>
                </select>

                <!-- Checkbox para desactivar camera-controls mientras se edita -->
                <div style="margin: 10px 0;">
                    <label style="display: flex; align-items: center; gap: 8px;">
                        <input type="checkbox" id="disable-camera" checked>
                        <span style="color: var(--neon-cyan);">Desactivar controles de cámara al editar</span>
                    </label>
                </div>

                <div class="transform-section">
                    <h4>Posición (metros)</h4>
                    <div class="coord-sliders">
                        <div class="slider-group">
                            <label>X <span id="pos-x-val">0.00</span></label>
                            <input type="range" id="pos-x" min="-5" max="5" step="0.01" value="0">
                            <div class="step-buttons">
                                <button class="step-btn" data-axis="pos" data-coord="x" data-dir="-1">-</button>
                                <button class="step-btn" data-axis="pos" data-coord="x" data-dir="1">+</button>
                            </div>
                        </div>
                        <div class="slider-group">
                            <label>Y <span id="pos-y-val">0.00</span></label>
                            <input type="range" id="pos-y" min="-5" max="5" step="0.01" value="0">
                            <div class="step-buttons">
                                <button class="step-btn" data-axis="pos" data-coord="y" data-dir="-1">-</button>
                                <button class="step-btn" data-axis="pos" data-coord="y" data-dir="1">+</button>
                            </div>
                        </div>
                        <div class="slider-group">
                            <label>Z <span id="pos-z-val">0.00</span></label>
                            <input type="range" id="pos-z" min="-5" max="5" step="0.01" value="0">
                            <div class="step-buttons">
                                <button class="step-btn" data-axis="pos" data-coord="z" data-dir="-1">-</button>
                                <button class="step-btn" data-axis="pos" data-coord="z" data-dir="1">+</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="transform-section">
                    <h4>Rotación (grados)</h4>
                    <div class="coord-sliders">
                        <div class="slider-group">
                            <label>X <span id="rot-x-val">0.0</span></label>
                            <input type="range" id="rot-x" min="-180" max="180" step="0.1" value="0">
                            <div class="step-buttons">
                                <button class="step-btn" data-axis="rot" data-coord="x" data-dir="-1">-</button>
                                <button class="step-btn" data-axis="rot" data-coord="x" data-dir="1">+</button>
                            </div>
                        </div>
                        <div class="slider-group">
                            <label>Y <span id="rot-y-val">0.0</span></label>
                            <input type="range" id="rot-y" min="-180" max="180" step="0.1" value="0">
                            <div class="step-buttons">
                                <button class="step-btn" data-axis="rot" data-coord="y" data-dir="-1">-</button>
                                <button class="step-btn" data-axis="rot" data-coord="y" data-dir="1">+</button>
                            </div>
                        </div>
                        <div class="slider-group">
                            <label>Z <span id="rot-z-val">0.0</span></label>
                            <input type="range" id="rot-z" min="-180" max="180" step="0.1" value="0">
                            <div class="step-buttons">
                                <button class="step-btn" data-axis="rot" data-coord="z" data-dir="-1">-</button>
                                <button class="step-btn" data-axis="rot" data-coord="z" data-dir="1">+</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="transform-section">
                    <h4>Escala</h4>
                    <div class="coord-sliders">
                        <div class="slider-group">
                            <label>X <span id="scale-x-val">1.00</span></label>
                            <input type="range" id="scale-x" min="0.1" max="3" step="0.01" value="1">
                            <div class="step-buttons">
                                <button class="step-btn" data-axis="scale" data-coord="x" data-dir="-0.1">-</button>
                                <button class="step-btn" data-axis="scale" data-coord="x" data-dir="0.1">+</button>
                            </div>
                        </div>
                        <div class="slider-group">
                            <label>Y <span id="scale-y-val">1.00</span></label>
                            <input type="range" id="scale-y" min="0.1" max="3" step="0.01" value="1">
                            <div class="step-buttons">
                                <button class="step-btn" data-axis="scale" data-coord="y" data-dir="-0.1">-</button>
                                <button class="step-btn" data-axis="scale" data-coord="y" data-dir="0.1">+</button>
                            </div>
                        </div>
                        <div class="slider-group">
                            <label>Z <span id="scale-z-val">1.00</span></label>
                            <input type="range" id="scale-z" min="0.1" max="3" step="0.01" value="1">
                            <div class="step-buttons">
                                <button class="step-btn" data-axis="scale" data-coord="z" data-dir="-0.1">-</button>
                                <button class="step-btn" data-axis="scale" data-coord="z" data-dir="0.1">+</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="edit-panel-actions">
                    <button id="reset-transform" class="reset-btn">Restablecer</button>
                </div>
                <p style="font-size:0.8rem; color:#aaa; text-align:center; margin-top:10px;">
                    Los cambios se aplican en tiempo real
                </p>
            </div>
        </div>

    </main>

    <script src="lobby-main.js"></script>
</body>
</html>
