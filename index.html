<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archinime OS - Habitación de Lunari</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <link rel="stylesheet" href="lobby-style.css">
</head>
<body>

    <!-- Video oculto (ya no se usa) -->
    <video id="weather-video" autoplay loop muted playsinline style="display:none;"></video>

    <div id="room-background">
        <!-- Modelo principal: paredes (con controles y clic) -->
        <model-viewer 
            id="room-model" 
            class="bg-model main-model" 
            src="paredes.glb" 
            shadow-intensity="1" 
            camera-controls 
            disable-zoom 
            disable-tap
            disable-pan
            interaction-prompt="none"
            camera-target="0m 1m 0m"
            camera-orbit="0deg 70deg 2.8m" 
            min-camera-orbit="-35deg 70deg 2.8m"
            max-camera-orbit="35deg 70deg 2.8m"
            field-of-view="60deg">
        </model-viewer>

        <!-- Modelo secundario: cortinas - Si no se ve, ajusta position, scale o rotation -->
        <model-viewer 
            id="cortinas-model" 
            class="bg-model secondary-model" 
            src="cortinas.glb" 
            shadow-intensity="1" 
            disable-zoom 
            disable-tap
            disable-pan
            interaction-prompt="none"
            scale="1 1 1"
            position="0m 0m 0m"
            rotation="0deg 0deg 0deg"
            camera-target="0m 1m 0m"
            camera-orbit="0deg 70deg 2.8m"
            min-camera-orbit="-35deg 70deg 2.8m"
            max-camera-orbit="35deg 70deg 2.8m"
            field-of-view="60deg">
        </model-viewer>

        <!-- Modelo secundario: piso -->
        <model-viewer 
            id="piso-model" 
            class="bg-model secondary-model" 
            src="piso.glb" 
            shadow-intensity="1" 
            disable-zoom 
            disable-tap
            disable-pan
            interaction-prompt="none"
            scale="1 1 1"
            position="0m 0m 0m"
            rotation="0deg 0deg 0deg"
            camera-target="0m 1m 0m"
            camera-orbit="0deg 70deg 2.8m"
            min-camera-orbit="-35deg 70deg 2.8m"
            max-camera-orbit="35deg 70deg 2.8m"
            field-of-view="60deg">
        </model-viewer>

        <!-- Modelo secundario: cama - Ajusta scale y position según tamaño -->
        <model-viewer 
            id="cama-model" 
            class="bg-model secondary-model" 
            src="cama.glb" 
            shadow-intensity="1" 
            disable-zoom 
            disable-tap
            disable-pan
            interaction-prompt="none"
            scale="0.5 0.5 0.5"   <!-- Reduce tamaño si es muy grande -->
            position="0m 0m 0m"    <!-- Cambia para colocarla en su sitio -->
            rotation="0deg 0deg 0deg"
            camera-target="0m 1m 0m"
            camera-orbit="0deg 70deg 2.8m"
            min-camera-orbit="-35deg 70deg 2.8m"
            max-camera-orbit="35deg 70deg 2.8m"
            field-of-view="60deg">
        </model-viewer>

        <!-- Modelo secundario: alfombra -->
        <model-viewer 
            id="alfombra-model" 
            class="bg-model secondary-model" 
            src="alfombra.glb" 
            shadow-intensity="1" 
            disable-zoom 
            disable-tap
            disable-pan
            interaction-prompt="none"
            scale="1 1 1"
            position="0m 0m 0m"
            rotation="0deg 0deg 0deg"
            camera-target="0m 1m 0m"
            camera-orbit="0deg 70deg 2.8m"
            min-camera-orbit="-35deg 70deg 2.8m"
            max-camera-orbit="35deg 70deg 2.8m"
            field-of-view="60deg">
        </model-viewer>

        <!-- Modelo climático (se cambia según el clima) -->
        <model-viewer 
            id="weather-model" 
            class="bg-model secondary-model" 
            src="soleado.glb" 
            shadow-intensity="1" 
            disable-zoom 
            disable-tap
            disable-pan
            interaction-prompt="none"
            scale="1 1 1"
            position="0m 0m 0m"
            rotation="0deg 0deg 0deg"
            camera-target="0m 1m 0m"
            camera-orbit="0deg 70deg 2.8m"
            min-camera-orbit="-35deg 70deg 2.8m"
            max-camera-orbit="35deg 70deg 2.8m"
            field-of-view="60deg">
        </model-viewer>
    </div>

    <main id="room-container">
        <div id="character-layer">
            <model-viewer 
                id="waifu-placeholder" 
                src="lunari_saluda.glb" 
                autoplay 
                disable-zoom
                disable-tap
                disable-pan
                interaction-prompt="none"
                shadow-intensity="1">
            </model-viewer>
            
            <div id="dialogue-box" class="hidden">
                <h3 class="char-name">Lunari</h3>
                <p id="dialogue-text">¡Hola! Bienvenido de nuevo a casa.<br>¿Vemos un anime hoy?</p>
            </div>
        </div>
    </main>

    <script src="lobby-main.js"></script>
</body>
</html>
