<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archinime OS - Habitación de Lunari</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <link rel="stylesheet" href="lobby-style.css">
</head>
<body>

    <video id="weather-video" autoplay loop muted playsinline></video>

    <div id="room-background">
        <!-- Modelo principal: paredes (con controles y clic) -->
        <model-viewer 
            id="room-model" 
            class="bg-model main-model" 
            src="paredes.glb" 
            shadow-intensity="1" 
            camera-controls 
            disable-zoom 
            disable-tap
            disable-pan
            interaction-prompt="none"
            camera-target="0m 1m 0m"
            camera-orbit="0deg 70deg 2.8m" 
            min-camera-orbit="-35deg 70deg 2.8m"
            max-camera-orbit="35deg 70deg 2.8m"
            field-of-view="60deg"
            position="0m 0m 0m"
            rotation="0deg 0deg 0deg"
            scale="1 1 1">
        </model-viewer>

        <!-- Modelo secundario: cortinas (sin controles, se sincroniza) -->
        <model-viewer 
            id="cortinas-model" 
            class="bg-model secondary-model" 
            src="cortinas.glb" 
            shadow-intensity="1" 
            disable-zoom 
            disable-tap
            disable-pan
            interaction-prompt="none"
            camera-target="0m 1m 0m"
            camera-orbit="0deg 70deg 2.8m"
            min-camera-orbit="-35deg 70deg 2.8m"
            max-camera-orbit="35deg 70deg 2.8m"
            field-of-view="60deg"
            position="0m 0m 0m"
            rotation="0deg 0deg 0deg"
            scale="1 1 1">
        </model-viewer>

        <!-- Modelo secundario: piso (sin controles, se sincroniza) -->
        <model-viewer 
            id="piso-model" 
            class="bg-model secondary-model" 
            src="piso.glb" 
            shadow-intensity="1" 
            disable-zoom 
            disable-tap
            disable-pan
            interaction-prompt="none"
            camera-target="0m 1m 0m"
            camera-orbit="0deg 70deg 2.8m"
            min-camera-orbit="-35deg 70deg 2.8m"
            max-camera-orbit="35deg 70deg 2.8m"
            field-of-view="60deg"
            position="0m 0m 0m"
            rotation="0deg 0deg 0deg"
            scale="1 1 1">
        </model-viewer>
    </div>

    <main id="room-container">

        <div id="character-layer">
            <!-- Personaje -->
            <model-viewer 
                id="waifu-placeholder" 
                src="lunari_saluda.glb" 
                autoplay 
                disable-zoom
                disable-tap
                disable-pan
                interaction-prompt="none"
                shadow-intensity="1"
                position="0m 0m 0m"
                rotation="0deg 0deg 0deg"
                scale="1 1 1">
            </model-viewer>
            
            <div id="dialogue-box" class="hidden">
                <h3 class="char-name">Lunari</h3>
                <p id="dialogue-text">¡Hola! Bienvenido de nuevo a casa.<br>¿Vemos un anime hoy?</p>
            </div>
        </div>

        <!-- Botón para abrir el panel de edición -->
        <button id="edit-toggle" class="edit-toggle-btn">
            <i class="fas fa-sliders-h"></i>
        </button>

        <!-- Panel de edición de modelos -->
        <div id="edit-panel" class="edit-panel hidden">
            <div class="edit-panel-header">
                <h3><i class="fas fa-cube"></i> Editor de Modelos</h3>
                <button id="close-panel" class="close-btn"><i class="fas fa-times"></i></button>
            </div>
            <div class="edit-panel-content">
                <label for="model-select">Modelo:</label>
                <select id="model-select">
                    <option value="room-model">Paredes</option>
                    <option value="cortinas-model">Cortinas</option>
                    <option value="piso-model">Piso</option>
                    <option value="waifu-placeholder">Personaje</option>
                </select>

                <div class="transform-section">
                    <h4>Posición (metros)</h4>
                    <div class="coord-inputs">
                        <label>X <input type="number" id="pos-x" step="0.01" value="0"></label>
                        <label>Y <input type="number" id="pos-y" step="0.01" value="0"></label>
                        <label>Z <input type="number" id="pos-z" step="0.01" value="0"></label>
                    </div>
                </div>

                <div class="transform-section">
                    <h4>Rotación (grados)</h4>
                    <div class="coord-inputs">
                        <label>X <input type="number" id="rot-x" step="0.1" value="0"></label>
                        <label>Y <input type="number" id="rot-y" step="0.1" value="0"></label>
                        <label>Z <input type="number" id="rot-z" step="0.1" value="0"></label>
                    </div>
                </div>

                <div class="transform-section">
                    <h4>Escala</h4>
                    <div class="coord-inputs">
                        <label>X <input type="number" id="scale-x" step="0.01" min="0" value="1"></label>
                        <label>Y <input type="number" id="scale-y" step="0.01" min="0" value="1"></label>
                        <label>Z <input type="number" id="scale-z" step="0.01" min="0" value="1"></label>
                    </div>
                </div>

                <div class="edit-panel-actions">
                    <button id="reset-transform" class="reset-btn">Restablecer</button>
                </div>
            </div>
        </div>

    </main>

    <script src="lobby-main.js"></script>
</body>
</html>
