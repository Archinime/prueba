<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archinime OS - Habitación de Lunari</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <link rel="stylesheet" href="lobby-style.css">
</head>
<body>

    <video id="weather-video" autoplay loop muted playsinline></video>

    <div id="room-background">
        <!-- 
            MODELO PRINCIPAL: PAREDES
            - Posición asumida: (0, 0, 0) en el mundo 3D (según el archivo .glb)
            - Rotación asumida: (0°, 0°, 0°) (sin rotación adicional)
            - Este modelo tiene camera-controls habilitado y es el que recibe clics.
        -->
        <model-viewer 
            id="room-model" 
            class="bg-model main-model" 
            src="paredes.glb" 
            shadow-intensity="1" 
            camera-controls 
            disable-zoom 
            disable-tap
            disable-pan
            interaction-prompt="none"
            camera-target="0m 1m 0m"
            camera-orbit="0deg 70deg 2.8m" 
            min-camera-orbit="-35deg 70deg 2.8m"
            max-camera-orbit="35deg 70deg 2.8m"
            field-of-view="60deg">
        </model-viewer>

        <!-- 
            MODELO SECUNDARIO: CORTINAS
            - Posición asumida: (0, 0, 0) (debe coincidir con paredes)
            - Rotación asumida: (0°, 0°, 0°)
            - Sin controles de cámara, se sincroniza con el principal.
        -->
	<model-viewer 
	    id="cortinas-model" 
	    class="bg-model secondary-model" 
	    src="cortinas.glb" 
	    shadow-intensity="1" 
	    disable-zoom 
	    disable-tap
	    disable-pan
	    interaction-prompt="none"
	    position="-0.5 0 0"          <!-- ← Esto la mueve a la izquierda -->
	    camera-target="0m 1m 0m"     <!-- No cambies esto -->
	    camera-orbit="0deg 70deg 2.8m"
	    min-camera-orbit="-35deg 70deg 2.8m"
	    max-camera-orbit="35deg 70deg 2.8m"
	    field-of-view="60deg">
	</model-viewer>

        <!-- 
            MODELO SECUNDARIO: PISO
            - Posición asumida: (0, 0, 0) (debe coincidir con paredes)
            - Rotación asumida: (0°, 0°, 0°)
            - Sin controles de cámara, se sincroniza con el principal.
        -->
        <model-viewer 
            id="piso-model" 
            class="bg-model secondary-model" 
            src="piso.glb" 
            shadow-intensity="1" 
            disable-zoom 
            disable-tap
            disable-pan
            interaction-prompt="none"
            camera-target="0m 1m 0m"
            camera-orbit="0deg 70deg 2.8m"
            min-camera-orbit="-35deg 70deg 2.8m"
            max-camera-orbit="35deg 70deg 2.8m"
            field-of-view="60deg">
        </model-viewer>
    </div>

    <main id="room-container">

        <div id="character-layer">
            <!-- 
                MODELO DEL PERSONAJE (Lunari)
                - Posición asumida: (0, 0, 0) en su propio contexto 3D.
                - Rotación asumida: (0°, 0°, 0°) (debe mirar hacia la cámara por defecto).
                - La cámara de este modelo se sincroniza con la de la habitación para que parezca que está dentro.
                - La escala y posición en pantalla se ajustan vía CSS (flexbox) para colocarlo en la parte inferior.
                - Nota: Para una integración perfecta, el modelo debería estar modelado en el origen y con la escala adecuada.
            -->
            <model-viewer 
                id="waifu-placeholder" 
                src="lunari_saluda.glb" 
                autoplay 
                disable-zoom
                disable-tap
                disable-pan
                interaction-prompt="none"
                shadow-intensity="1">
            </model-viewer>
            
            <div id="dialogue-box" class="hidden">
                <h3 class="char-name">Lunari</h3>
                <p id="dialogue-text">¡Hola! Bienvenido de nuevo a casa.<br>¿Vemos un anime hoy?</p>
            </div>
        </div>

    </main>

    <script src="lobby-main.js"></script>
</body>
</html>
