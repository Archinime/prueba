<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archinime OS - Habitación de Lunari</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- mantenemos model-viewer (para la waifu) -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <link rel="stylesheet" href="lobby-style.css">
</head>
<body>

    <video id="weather-video" autoplay loop muted playsinline></video>

    <div id="room-background">
        <!-- Reemplazamos el model-viewer de la habitación por un contenedor.
             Three.js inyectará un canvas aquí, pero mantenemos el mismo id y clase. -->
        <div id="room-model" class="bg-model" style="touch-action: none;"></div>
    </div>

    <main id="room-container">

        <div id="character-layer">
            <model-viewer 
                id="waifu-placeholder" 
                src="lunari_saluda.glb" 
                autoplay 
                disable-zoom
                disable-tap
                disable-pan
                interaction-prompt="none"
                shadow-intensity="1"
                camera-target="0m 0.8m 0m"
                camera-orbit="0deg 75deg 3.5m">
            </model-viewer>
            
            <div id="dialogue-box" class="hidden">
                <h3 class="char-name">Lunari</h3>
                <p id="dialogue-text">¡Hola! Bienvenido de nuevo a casa.<br>¿Vemos un anime hoy?</p>
            </div>
        </div>

    </main>

    <!-- Ahora cargamos el script como module para poder importar three.js/GLTFLoader/OrbitControls -->
    <script type="module" src="lobby-main.js"></script>
</body>
</html>
